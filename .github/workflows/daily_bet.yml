name: Daily TennisBet Report

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: WTA backfill from Tennis Explorer
        run: |
          python -m src.wta_backfill --years 2025 2026
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          RTRVR_API_KEY: ${{ secrets.RTRVR_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: Run daily report
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: python -m src.daily_report --skip-retrain

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tennisbet-daily-report
          path: |
            data/meta/prediction_log.csv
            data/meta/daily_report_latest.html
