name: Daily TennisBet

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

jobs:
  daily-bet:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Data Scraping ──────────────────────────────────────────

      - name: Clone Sackmann repos (player ID resolution)
        run: |
          git clone --depth 1 https://github.com/JeffSackmann/tennis_atp.git data/raw/tennis_atp
          git clone --depth 1 https://github.com/JeffSackmann/tennis_wta.git data/raw/tennis_wta
          echo "ATP players: $(wc -l < data/raw/tennis_atp/atp_players.csv) lines"
          echo "WTA players: $(wc -l < data/raw/tennis_wta/wta_players.csv) lines"

      - name: ATP data from TML-Database
        run: python -m src.tml_ingest --years 2025 2026
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Flashscore results scrape (ATP + WTA)
        run: |
          python -c "
          import json
          from src.data_updater import scrape_flashscore_results
          result = scrape_flashscore_results()
          print(json.dumps(result, indent=2, default=str))
          "
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Sackmann git pull (latest raw data)
        run: |
          python -c "
          import json
          from src.data_updater import update_data_sources
          result = update_data_sources()
          print(json.dumps(result, indent=2, default=str))
          "
        env:
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      - name: WTA backfill (Tennis Explorer via Firecrawl)
        run: python -m src.wta_backfill --years 2025 2026
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          RTRVR_API_KEY: ${{ secrets.RTRVR_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true

      # ── Pipeline ───────────────────────────────────────────────

      - name: Rebuild data pipeline
        run: |
          python -c "
          import json
          from src.data_pipeline import run_pipeline
          result = run_pipeline(incremental=True)
          print(json.dumps(result, indent=2, default=str))
          "
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── Predictions + Email ────────────────────────────────────

      - name: Daily report (odds + predictions + email)
        run: python -m src.daily_report --skip-retrain --skip-data
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          PYTHONPATH: ${{ github.workspace }}

      # ── Commit + Artifacts ─────────────────────────────────────

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/custom/ || true
          git add data/processed/ || true
          git add data/meta/last_update.json || true
          git add data/meta/tml_id_cache.json || true

          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: daily update $(date -u +%Y-%m-%d)"
            git push
            echo "Data committed and pushed"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tennisbet-daily-${{ github.run_number }}
          path: |
            data/custom/
            data/processed/
            data/meta/last_update.json
            data/meta/tml_id_cache.json
            data/meta/daily_report_latest.html
            data/meta/prediction_log.csv
          retention-days: 7
