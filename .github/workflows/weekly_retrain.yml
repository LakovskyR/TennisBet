name: Weekly Model Retrain

on:
  schedule:
    - cron: "0 3 * * 0" # Sunday 3:00 AM UTC
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run retraining
        timeout-minutes: 45
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: python -m src.retrain_cli

      - name: Commit and push updated models
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git add data/meta/last_update.json data/processed/*.csv data/processed/*.json || true
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "Weekly model retrain [skip ci]" && git push)

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tennisbet-models
          path: models/
